[fmt]
line_length = 120
tab_width = 2
bracket_spacing = false
int_types = 'long'
quote_style = 'single'
number_underscore = 'thousands'
multiline_func_header = 'params_first'
sort_imports = true


[profile.default]
solc_version = '0.8.30'
optimizer = false
evm_version = 'prague'
toolchain = 'v1.1.0'
src = 'src'
out = 'out'
libs = ['lib']

[profile.optimized]
via_ir = true
out = 'out-via-ir'


[profile.test]
via_ir = true
out = 'out-via-ir'

[fuzz]
runs = 1000

[rpc_endpoints]
mainnet = "${ETHEREUM_RPC_URL}"

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
