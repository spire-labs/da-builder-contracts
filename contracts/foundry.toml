[fmt]
line_length = 120
tab_width = 2
bracket_spacing = false
int_types = 'long'
quote_style = 'single'
number_underscore = 'thousands'
multiline_func_header = 'params_first'
sort_imports = true

[lint]
# For certain situations we should ignore mixed-case-function based on our style, this is a loose rule, potentially we want to enforce it and manually disable at specific lines
exclude_lints = ["mixed-case-function"]


[profile.default]
solc_version = '0.8.30'
evm_version = 'osaka'
src = 'src'
out = 'out'
libs = ['lib']
optimizer = true
optimizer_runs = 100_000_000

[profile.optimized]
via_ir = true
out = 'out-via-ir'


[profile.test]
via_ir = true
out = 'out-via-ir'

[fuzz]
runs = 1000

[rpc_endpoints]
mainnet = "${ETHEREUM_RPC_URL}"

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
